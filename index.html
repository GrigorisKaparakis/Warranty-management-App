
<!DOCTYPE html>
<html lang="el">
<head>
  <script>
    window.addEventListener("error", function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:10%;left:10%;right:10%;bottom:10%;background:red;color:white;z-index:999999;padding:20px;overflow:auto;font-family:monospace;font-size:16px;"><h1>CRASH LOG</h1><pre>' + e.error?.stack + '</pre></div>';
    });
    window.addEventListener("unhandledrejection", function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:10%;left:10%;right:10%;bottom:10%;background:red;color:white;z-index:999999;padding:20px;overflow:auto;font-family:monospace;font-size:16px;"><h1>PROMISE CRASH LOG</h1><pre>' + (e.reason?.stack || e.reason) + '</pre></div>';
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarrantyH&K</title>

</head>

</body>
</html>
